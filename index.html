<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mainque Peralta Maltese — Rugby Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    /* ── Language switcher ── */
    .lang-bar {
      width: 100%; max-width: 900px;
      display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 12px;
    }
    .lang-btn {
      background: none; border: 2px solid #1c1c1c; color: #1c1c1c;
      font-family: inherit; font-size: 13px; font-weight: 700;
      padding: 4px 14px; border-radius: 3px; cursor: pointer;
      letter-spacing: .5px; transition: background .18s, color .18s;
    }
    .lang-btn.active, .lang-btn:hover { background: #1c1c1c; color: #fff; }

    /* ── CV card ── */
    .cv { width: 100%; max-width: 900px; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.18); }

    /* ── Header ── */
    .cv-header {
      background: #1c1c1c; display: flex; align-items: center;
      gap: 24px; padding: 28px 36px;
    }
    .cv-header img {
      width: 108px; height: 108px; border-radius: 50%;
      object-fit: cover; border: 3px solid #fff; flex-shrink: 0;
    }
    .cv-header-text h1 { color: #fff; font-size: 2rem; font-weight: 700; letter-spacing: .5px; line-height: 1.15; }
    .cv-header-text .subtitle { color: #bbb; font-size: .95rem; margin-top: 8px; letter-spacing: .3px; }
    .cv-header-text .subtitle .dot { margin: 0 6px; color: #c0392b; }

    /* ── Body ── */
    .cv-body { display: grid; grid-template-columns: 38% 62%; }
    .col-left { background: #f4f4f4; border-right: 1px solid #ddd; padding: 28px 26px; }
    .col-right { padding: 28px 30px; }

    /* ── Section title ── */
    .sec-title {
      font-size: .8rem; font-weight: 700; letter-spacing: 1.2px; color: #1c1c1c;
      text-transform: uppercase; border-bottom: 3px solid #c0392b;
      padding-bottom: 4px; margin-bottom: 12px; margin-top: 22px;
    }
    .col-left .sec-title:first-child, .col-right .sec-title:first-child { margin-top: 0; }

    /* ── Label / value ── */
    .lv { font-size: .88rem; margin-bottom: 7px; line-height: 1.4; }
    .lv strong { color: #1c1c1c; }
    .lv span { color: #4a4a4a; }

    /* ── Bullets ── */
    ul.cv-list { list-style: none; padding: 0; }
    ul.cv-list li {
      font-size: .9rem; color: #1c1c1c; padding: 5px 0 5px 16px;
      position: relative; line-height: 1.45;
    }
    ul.cv-list li::before { content: '–'; position: absolute; left: 0; color: #c0392b; font-weight: 700; }

    /* ── Plain text ── */
    .cv-para { font-size: .9rem; color: #4a4a4a; line-height: 1.6; margin-top: 8px; }
    .bold-line { font-size: .88rem; font-weight: 700; color: #1c1c1c; margin-top: 8px; }
    .plain-line { font-size: .86rem; color: #4a4a4a; margin-top: 2px; }

    /* ── Footer ── */
    .cv-footer { background: #1c1c1c; text-align: center; padding: 10px; font-size: .78rem; color: #888; letter-spacing: .5px; }

    @media (max-width: 620px) {
      .cv-body { grid-template-columns: 1fr; }
      .col-left { border-right: none; border-bottom: 1px solid #ddd; }
      .cv-header h1 { font-size: 1.4rem; }
      .cv-header img { width: 80px; height: 80px; }
    }
  </style>
</head>

</div>

<script>
  const LANG_DEFAULT = 'es';

  function setLang(lang) {
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.textContent.trim() === lang.toUpperCase());
    });

    document.querySelectorAll('[data-t]').forEach(el => {
      try {
        const map = JSON.parse(el.getAttribute('data-t'));
        if (map[lang] !== undefined) el.textContent = map[lang];
      } catch(e) {}
    });

    document.documentElement.lang = lang;
  }

  // Init on load
  setLang(LANG_DEFAULT);
</script>
